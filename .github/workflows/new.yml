# ============================================================
#  .github/workflows/readme-update.yml
#
#  WHAT THIS DOES:
#    Job 1 — Generates Pac-Man SVG (light + dark) using the
#            CORRECT action: abozanona/pacman-contribution-graph
#            Pushes SVGs to `output` branch.
#            README reads them from:
#              raw.githubusercontent.com/Aditgm/Aditgm/output/pacman-contribution-graph[-dark].svg
#
#    Job 2 — Commits a refresh timestamp so your activity
#            graph stays green and stats URLs get re-fetched.
#
#  SETUP (one-time, takes 30 seconds):
#    Settings → Actions → General →
#      Workflow permissions → "Read and write permissions" ✓
#    That's it. No extra secrets needed.
#
#  FIRST RUN:
#    Go to Actions tab → "README Pac-Man & Stats" → Run workflow
#    This creates the `output` branch and both SVG files.
#    After that it runs automatically every 24h.
# ============================================================

name: README Pac-Man & Stats

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:        # manual trigger from Actions tab
  push:
    branches: [main]

jobs:

  # ──────────────────────────────────────────────────────────
  #  JOB 1: PAC-MAN CONTRIBUTION GRAPH
  #  Uses abozanona/pacman-contribution-graph (real Pac-Man)
  #  NOT platane/snk (that's a snake, not Pac-Man)
  # ──────────────────────────────────────────────────────────
  pacman:
    name: Pac-Man Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pac-Man SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
        # This generates into ./dist/:
        #   pacman-contribution-graph.svg        (light theme)
        #   pacman-contribution-graph-dark.svg   (dark theme)

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────
  #  JOB 2: STATS CACHE REFRESH
  #  Commits a tiny timestamp file so:
  #   • Activity graph stays green (daily commit)
  #   • GitHub CDN invalidates cached stats images
  #  Runs after Job 1 to avoid push conflicts.
  # ──────────────────────────────────────────────────────────
  refresh:
    name: Stats Refresh
    runs-on: ubuntu-latest
    needs: pacman
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write timestamp
        run: |
          mkdir -p .github
          echo "refreshed: $(date -u '+%Y-%m-%d %H:%M UTC')" > .github/.stats-refresh.log

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.stats-refresh.log
          git diff --staged --quiet || git commit -m "chore: stats refresh [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
