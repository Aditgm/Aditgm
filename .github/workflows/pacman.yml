# .github/workflows/readme-animations.yml
#
# RUNS: every 12 hours, on push to main, or manually
# DOES:
#   Job 1 — generates Pac-Man SVG (light + dark) → pushes to `output` branch
#   Job 2 — commits a refresh log so your activity graph stays green
#
# SETUP REQUIRED:
#   No secrets needed — uses the built-in GITHUB_TOKEN.
#   Make sure your repo has GitHub Actions write permission:
#     Settings → Actions → General → Workflow permissions → Read and write

name: 🎮 README Animations & Stats Refresh

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # allow manual trigger from Actions tab
  push:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────────────────────
  #  JOB 1 — PAC-MAN CONTRIBUTION GRAPH
  #  Generates both light + dark SVGs and pushes to `output` branch.
  #  Your README's <picture> tags point at these files — no change needed.
  # ─────────────────────────────────────────────────────────────
  pacman-graph:
    name: 🟡 Pac-Man Contribution Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pac-Man SVGs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github
            dist/pacman-contribution-graph-dark.svg?palette=github-dark

      - name: Push SVGs to `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  #  JOB 2 — STATS CACHE REFRESH
  #  Commits a tiny log file so:
  #    a) Your activity graph shows commits (stays green)
  #    b) GitHub re-fetches all badge/stats image URLs
  #  Runs after Job 1 to avoid push conflicts on the same branch.
  # ─────────────────────────────────────────────────────────────
  refresh-stats:
    name: 📊 Refresh Stats Cache
    runs-on: ubuntu-latest
    needs: pacman-graph
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write refresh timestamp
        run: |
          mkdir -p .github
          echo "Last refreshed: $(date -u '+%Y-%m-%d %H:%M UTC')" > .github/.stats-refresh.log

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.stats-refresh.log
          git diff --staged --quiet || git commit -m "chore: 🔄 stats refresh [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
