name: 🎮 Readme Animations & Stats

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Generate Pac-Man Contribution Graph
  # ─────────────────────────────────────────────
  pacman-graph:
    name: 🟡 Pac-Man Contribution Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Pac-Man Graph (light + dark)
        uses: hugoalh/github-actions-core-graphql@v1
        id: pacman
        continue-on-error: true  # Don't block if this fails

      # Primary action
      - name: Generate Snake / Pac-Man animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github
            dist/pacman-contribution-graph-dark.svg?palette=github-dark
          # Use pac-man mode
          gif: false

      - name: Push output to `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 2: Update README Stats Cache (optional)
  # Bypasses Vercel rate-limits by embedding
  # a timestamp so GitHub re-fetches the badge.
  # ─────────────────────────────────────────────
  update-readme:
    name: 📊 Refresh README Timestamp
    runs-on: ubuntu-latest
    needs: pacman-graph   # Run after Pac-Man so both commits don't conflict
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update last-updated badge in README
        run: |
          DATE=$(date -u '+%Y--%-m--%d')
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$DATE'))")
          # Optionally swap a placeholder badge — only if you added one
          # sed -i "s/last--updated--[^-]*--[^?]*/last--updated--${ENCODED}--blue/g" README.md
          echo "Last updated: $DATE"
          echo "README stats refreshed at $DATE" >> .stats-refresh.log

      - name: Commit refresh log (keeps activity graph green)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .stats-refresh.log || true
          git diff --staged --quiet || git commit -m "chore: 🔄 refresh stats [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
